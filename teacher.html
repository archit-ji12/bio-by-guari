<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio by Gauri - Admin Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #2c3e50; color: #ecf0f1; padding: 20px; }
        .box { background: #34495e; padding: 25px; border-radius: 10px; margin-bottom: 20px; max-width: 600px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h1, h2 { color: #2ecc71; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { background: #2ecc71; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; }
        button:hover { background: #27ae60; }
        .row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #7f8c8d; align-items: center; }
        .del-btn { background: #e74c3c; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; color: white; border: none; }
        .del-btn:hover { background: #c0392b; }
    </style>
</head>
<body>

    <div class="box">
        <h1>Upload New Note</h1>
        <input type="text" id="topic" placeholder="Enter Chapter Name">
        <input type="file" id="file" accept=".pdf">
        <button onclick="upload()">Upload Note to Cloud</button>
    </div>

    <div class="box" id="notes-list">
        <h2>Manage Notes</h2>
        <div id="list-container">Loading notes...</div>
    </div>

    <script>
        // Updated API link
        const API = "https://script.google.com/macros/s/AKfycbwQ5KbOQzYTpmxSb2P0II2xVRuxEemuhrIPX0gKS6WoV_9tkBLYNaIEGuG7XGAvlMY/exec";
        
        // Database link for listing notes
        const DB = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQUSbh8fPH6J-te3VYVeX2eg_sN9adn0mxyxmfYrVWfV0U6bRupJ0bmy_uKtNmGTzzLKQi0U4etkAje/pub?output=csv';

        // 1. Upload Function
        function upload() {
            const fileInput = document.getElementById('file');
            const topic = document.getElementById('topic').value;
            if(!topic || !fileInput.files[0]) return alert("Please fill everything!");
            
            const reader = new FileReader();
            reader.onload = (e) => {
                fetch(API, { 
                    method: "POST", 
                    body: JSON.stringify({ 
                        action: "add", 
                        topic: topic, 
                        filename: fileInput.files[0].name, 
                        mimeType: fileInput.files[0].type, 
                        base64: e.target.result.split(',')[1] 
                    }) 
                }).then(() => location.reload());
            };
            reader.readAsDataURL(fileInput.files[0]);
        }

        // 2. Delete Function
        function deleteNote(topic) {
            if(!confirm("Are you sure you want to delete this note?")) return;
            fetch(API, { method: "POST", body: JSON.stringify({ action: "delete", topic: topic }) })
            .then(() => location.reload());
        }

        // 3. Load Notes List
        fetch(DB).then(r => r.text()).then(data => {
            const rows = data.split('\n').slice(1);
            let html = '';
            rows.forEach(r => {
                const c = r.split(',');
                if(c[0]) html += `<div class="row"><span>${c[0]}</span> <button class="del-btn" onclick="deleteNote('${c[0]}')">Delete</button></div>`;
            });
            document.getElementById('list-container').innerHTML = html || "No notes available.";
        });
    </script>
</body>
</html>
