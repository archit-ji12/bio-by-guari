<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio by Gauri - Teacher Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50; 
            color: #ecf0f1;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .dashboard-container {
            background-color: #34495e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h1 { color: #2ecc71; margin-top: 0; }
        p { color: #bdc3c7; margin-bottom: 30px; }
        
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label { font-weight: bold; font-size: 14px; color: #ecf0f1; display: block; margin-bottom: 8px;}
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #7f8c8d;
            border-radius: 6px;
            background: #ecf0f1;
            color: #2c3e50;
            box-sizing: border-box;
        }
        
        .upload-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        .upload-btn:hover { background-color: #27ae60; }
        
        #status-message {
            margin-top: 20px;
            font-weight: bold;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        
        .logout-btn {
            display: inline-block;
            margin-top: 25px;
            color: #e74c3c;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }
        .logout-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1>☁️ Cloud Dashboard</h1>
        <p>Upload new notes directly to the student portal.</p>

        <div class="input-group">
            <label for="upload-topic">Chapter / Topic Name</label>
            <input type="text" id="upload-topic" placeholder="e.g., Chapter 3: Cell Structure">
        </div>

        <div class="input-group">
            <label for="upload-file">Select PDF Note File</label>
            <input type="file" id="upload-file" accept=".pdf,.docx">
        </div>

        <button class="upload-btn" onclick="uploadToCloud()">Upload Note to Cloud</button>
        
        <div id="status-message"></div>

        <a href="index.html" class="logout-btn">← Secure Logout</a>
    </div>

    <script>
        function uploadToCloud() {
            const topic = document.getElementById('upload-topic').value;
            const fileInput = document.getElementById('upload-file');
            const statusBox = document.getElementById('status-message');
            
            if (!topic || fileInput.files.length === 0) {
                statusBox.style.display = "block";
                statusBox.style.backgroundColor = "#e74c3c"; 
                statusBox.style.color = "white";
                statusBox.innerText = "⚠️ Please provide a topic and select a file!";
                return;
            }

            const file = fileInput.files[0];
            
            statusBox.style.display = "block";
            statusBox.style.backgroundColor = "#f39c12"; 
            statusBox.style.color = "white";
            statusBox.innerText = "⏳ Uploading to Cloud... Please wait.";

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Data = e.target.result.split(',')[1];
                
                const payload = {
                    topic: topic,
                    filename: file.name,
                    mimeType: file.type,
                    base64: base64Data
                };

                // YOUR NEW, WORKING GOOGLE APPS SCRIPT API LINK!
                const cloudAPI = "https://script.google.com/macros/s/AKfycbwkeAbvPY4v6Sew1tuvGVStIkaCUY7pLFBS7njMKUTzOk8-BInBsR4UqVwEsRwY19Xt/exec";

                fetch(cloudAPI, {
                    method: "POST",
                    body: JSON.stringify(payload)
                })
                .then(response => response.json())
                .then(data => {
                    if(data.status === "success") {
                        statusBox.style.backgroundColor = "#2ecc71"; 
                        statusBox.innerText = "✅ Upload Complete! Students can now see it on their portal.";
                        document.getElementById('upload-topic').value = ""; 
                        document.getElementById('upload-file').value = ""; 
                    } else {
                        statusBox.style.backgroundColor = "#e74c3c"; 
                        statusBox.innerText = "❌ Error: " + data.message;
                    }
                })
                .catch(error => {
                    statusBox.style.backgroundColor = "#e74c3c"; 
                    statusBox.innerText = "❌ Connection Error. Try again.";
                });
            };
            
            reader.readAsDataURL(file);
        }
    </script>

</body>
</html>
