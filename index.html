<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio by Gauri - Portal Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eafaf1; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .portal-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #2ecc71;
            margin-top: 0;
            font-size: 32px;
        }
        p {
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .role-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }
        .student-btn {
            background-color: #3498db;
            color: white;
        }
        .student-btn:hover { background-color: #2980b9; transform: scale(1.02); }
        
        .teacher-btn {
            background-color: #2c3e50;
            color: white;
        }
        .teacher-btn:hover { background-color: #1a252f; transform: scale(1.02); }

        #login-section {
            display: none;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px dashed #bdc3c7;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .login-submit {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-submit:hover { background-color: #27ae60; }
        .error-msg { color: #e74c3c; font-size: 14px; display: none; margin-top: 10px;}
    </style>
</head>
<body>

    <div class="portal-box">
        <h1>Bio by Gauri 🧬</h1>
        <p>Welcome to the official portal. Please select your role to continue.</p>

        <button class="role-btn student-btn" onclick="goToStudent()">👩‍🎓 I am a Student</button>
        <button class="role-btn teacher-btn" onclick="showLogin()">👩‍🏫 I am a Teacher</button>

        <div id="login-section">
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="login-submit" onclick="checkPassword()">Login</button>
            <div id="error-message" class="error-msg">Incorrect username or password!</div>
        </div>
    </div>

    <script>
        // 1. Student Button Logic
        function goToStudent() {
            window.location.href = "student.html"; 
        }

        // 2. Show Login Box
        function showLogin() {
            document.getElementById('login-section').style.display = 'block';
        }

        // 3. The New Teacher Dashboard
        function checkPassword() {
            const user = document.getElementById('username').value.toLowerCase();
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');

            if (user === "gauri" && pass === "bio123") {
                // Transform the page into the Upload Dashboard
                document.querySelector('.portal-box').innerHTML = `
                    <h2>☁️ Teacher Upload Dashboard</h2>
                    <p>Upload files directly to the cloud database.</p>
                    
                    <input type="text" id="upload-topic" placeholder="Chapter Name (e.g., Cell Biology)" style="width: 100%; padding: 10px; margin-bottom: 15px;">
                    <input type="file" id="upload-file" accept=".pdf, .docx" style="width: 100%; margin-bottom: 15px;">
                    
                    <button onclick="uploadToCloud()" style="background: #2ecc71; color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold;">Upload to Cloud</button>
                    <p id="status-message" style="margin-top: 15px; font-weight: bold;"></p>
                `;
            } else {
                errorMsg.style.display = "block";
            }
        }

        // 4. The Magic Cloud Upload Function
        function uploadToCloud() {
            const topic = document.getElementById('upload-topic').value;
            const fileInput = document.getElementById('upload-file');
            const statusText = document.getElementById('status-message');
            
            if (!topic || fileInput.files.length === 0) {
                statusText.style.color = "red";
                statusText.innerText = "Please provide a topic and select a file!";
                return;
            }

            const file = fileInput.files[0];
            statusText.style.color = "#f39c12";
            statusText.innerText = "Uploading to Cloud... Please wait.";

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Data = e.target.result.split(',')[1];
                
                const payload = {
                    topic: topic,
                    filename: file.name,
                    mimeType: file.type,
                    base64: base64Data
                };

                // YOUR LIVE GOOGLE APPS SCRIPT API LINK
                const cloudAPI = "https://script.google.com/macros/s/AKfycbwVFUwHE1JHq0pLyChA8ClI9rWzJEKWPBRyWA7ZqpFxvtVJAbcVPCyGg1gAV7vrddVe/exec";

                fetch(cloudAPI, {
                    method: "POST",
                    body: JSON.stringify(payload)
                })
                .then(response => response.json())
                .then(data => {
                    if(data.status === "success") {
                        statusText.style.color = "green";
                        statusText.innerText = "✅ Upload Complete! Students can now see it on their portal.";
                        document.getElementById('upload-topic').value = ""; 
                        document.getElementById('upload-file').value = "";
                    } else {
                        statusText.style.color = "red";
                        statusText.innerText = "Error: " + data.message;
                    }
                })
                .catch(error => {
                    statusText.style.color = "red";
                    statusText.innerText = "Connection Error. Try again.";
                });
            };
            
            reader.readAsDataURL(file);
        }
    </script>

</body>
</html>
