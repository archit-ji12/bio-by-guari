<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio by Gauri - Portal Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eafaf1; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .portal-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #2ecc71;
            margin-top: 0;
            font-size: 32px;
        }
        p {
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .role-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }
        .student-btn {
            background-color: #3498db;
            color: white;
        }
        .student-btn:hover { background-color: #2980b9; transform: scale(1.02); }
        
        .teacher-btn {
            background-color: #2c3e50;
            color: white;
        }
        .teacher-btn:hover { background-color: #1a252f; transform: scale(1.02); }

        #login-section {
            display: none;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px dashed #bdc3c7;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .login-submit {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-submit:hover { background-color: #27ae60; }
        .error-msg { color: #e74c3c; font-size: 14px; display: none; margin-top: 10px;}
    </style>
</head>
<body>

    <div class="portal-box">
        <h1>Bio by Gauri 🧬</h1>
        <p>Welcome to the official portal. Please select your role to continue.</p>

        <button class="role-btn student-btn" onclick="goToStudent()">👩‍🎓 I am a Student</button>
        <button class="role-btn teacher-btn" onclick="showLogin()">👩‍🏫 I am a Teacher</button>

        <div id="login-section">
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="login-submit" onclick="checkPassword()">Login</button>
            <div id="error-message" class="error-msg">Incorrect username or password!</div>
        </div>
    </div>

    <script>
        function goToStudent() {
            window.location.href = "student.html"; 
        }

        function showLogin() {
            document.getElementById('login-section').style.display = 'block';
        }

        function checkPassword() {
            const user = document.getElementById('username').value.toLowerCase();
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');

            // Default Credentials
            if (user === "gauri" && pass === "bio123") {
                // This is your live editable Google Sheet link
                window.location.href = "https://docs.google.com/spreadsheets/d/10s-X4uGWKR0VFb2zR0wazMFQDEpgSarg3uWkm7wDInI/edit?usp=sharing"; 
            } else {
                errorMsg.style.display = "block";
            }
        }
    </script>

</body>
</html>
