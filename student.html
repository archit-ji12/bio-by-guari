<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio by Gauri - Student Notes</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f9f5;
            margin: 0;
            padding: 0;
            color: #333;
        }
        header {
            background-color: #2ecc71; 
            color: white;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        header h1 { margin: 0; font-size: 32px; }
        header p { margin: 10px 0 0 0; font-size: 18px; opacity: 0.9; }

        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #2ecc71;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .note-card {
            background: #eafaf1;
            padding: 20px;
            margin: 15px 0;
            border-left: 6px solid #2ecc71;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }
        .note-card:hover { transform: translateX(5px); }
        .note-info strong { font-size: 18px; color: #2c3e50; }
        .note-info p { margin: 5px 0 0 0; font-size: 14px; color: #7f8c8d; }
        .download-btn {
            background-color: #3498db;
            text-decoration: none;
            padding: 10px 20px;
            color: white;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .download-btn:hover { background-color: #2980b9; }
        .home-btn {
            display: inline-block;
            margin: 20px 0;
            padding: 10px 15px;
            background-color: #bdc3c7;
            color: #2c3e50;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bio by Gauri 🧬</h1>
        <p>Official Portal for Biology Notes</p>
    </header>

    <div class="container">
        <a href="index.html" class="home-btn">← Back to Login</a>
        
        <div class="notes-section" id="notes-container">
            <h2>Available Notes</h2>
            <p>Loading the latest notes from the cloud...</p>
        </div>
    </div>

    <script>
        // Your specific Google Sheet CSV Link
        const sheetDatabaseLink = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQUSbh8fPH6J-te3VYVeX2eg_sN9adn0mxyxmfYrVWfV0U6bRupJ0bmy_uKtNmGTzzLKQi0U4etkAje/pub?output=csv';

        fetch(sheetDatabaseLink)
            .then(response => response.text())
            .then(data => {
                const rows = data.split('\n').slice(1); 
                let notesHTML = '<h2>Available Notes</h2>';
                
                rows.forEach(row => {
                    const columns = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || []; 
                    
                    if(columns.length >= 3) {
                        const title = columns[0].replace(/"/g, '').trim();
                        const date = columns[1].replace(/"/g, '').trim();
                        const link = columns[2].replace(/"/g, '').trim();
                        
                        notesHTML += `
                        <div class="note-card">
                            <div class="note-info">
                                <strong>${title}</strong>
                                <p>Uploaded: ${date}</p>
                            </div>
                            <a href="${link}" target="_blank" class="download-btn">View Note</a>
                        </div>`;
                    }
                });
                
                document.getElementById('notes-container').innerHTML = notesHTML;
            })
            .catch(error => {
                document.getElementById('notes-container').innerHTML = '<p>Error loading notes. Please check the database connection.</p>';
            });
    </script>

</body>
</html>
